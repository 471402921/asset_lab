<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>asset-lab remote console</title>
  <style>
    body {
      margin: 0;
      background: #1a1a1a;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #2a2a2a;
      border-bottom: 1px solid #444;
    }
    header h1 { font-size: 14px; margin: 0; color: #888; font-weight: 500; }
    header .hint { font-size: 11px; color: #666; margin-left: auto; }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px 16px;
    }
    .panel {
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px 20px;
      max-width: 520px;
      width: 100%;
      box-sizing: border-box;
    }
    .panel-title {
      font-size: 11px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* State strip — pill buttons */
    .state-strip { display: flex; flex-wrap: wrap; gap: 6px; }
    .state-strip button {
      flex-shrink: 0;
      padding: 8px 14px;
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .state-strip button:hover { background: #3a3a3a; }
    .state-strip button.active {
      background: #4a6da7; border-color: #6b8dc7; color: #fff;
    }

    /* DPad + side controls row */
    .row { display: flex; gap: 16px; align-items: flex-start; }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 4px;
    }
    .dpad button {
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 6px;
      width: 56px;
      height: 56px;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .dpad button:hover { background: #3a3a3a; }
    .dpad button:active, .dpad button.pressed {
      background: #4a6da7; border-color: #6b8dc7;
    }
    .dpad button[hidden] { display: none; }
    .dpad [data-dir="north"]      { grid-column: 2; grid-row: 1; }
    .dpad [data-dir="west"]       { grid-column: 1; grid-row: 2; }
    .dpad [data-dir="east"]       { grid-column: 3; grid-row: 2; }
    .dpad [data-dir="south"]      { grid-column: 2; grid-row: 3; }
    .dpad [data-dir="north-west"] { grid-column: 1; grid-row: 1; }
    .dpad [data-dir="north-east"] { grid-column: 3; grid-row: 1; }
    .dpad [data-dir="south-west"] { grid-column: 1; grid-row: 3; }
    .dpad [data-dir="south-east"] { grid-column: 3; grid-row: 3; }

    .side { display: flex; flex-direction: column; gap: 12px; }
    .side .group {
      display: flex; flex-direction: column; gap: 4px;
    }
    .side .group-label {
      font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .side .btns { display: flex; gap: 6px; }
    .side .btns button {
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      border-radius: 6px;
      width: 56px;
      height: 44px;
      font-size: 16px;
      cursor: pointer;
    }
    .side .btns button:hover { background: #3a3a3a; }
    .side .btns button:active { background: #4a6da7; border-color: #6b8dc7; }

    .status {
      font-size: 11px;
      color: #888;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      line-height: 1.6;
    }
    .status .ok { color: #6b8dc7; }
    .status .err { color: #e07070; }
    .status .keys-active { color: #f0c674; }

    .keymap-help {
      font-size: 11px;
      color: #888;
      line-height: 1.7;
    }
    .keymap-help b { color: #6b8dc7; }
    .keymap-help kbd {
      background: #111; padding: 1px 6px; border: 1px solid #444; border-radius: 3px;
      font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>asset-lab remote console</h1>
    <span class="hint">控制 https://1.14.190.95/?mode=level 上的 sprite (录像专用)</span>
  </header>
  <main>
    <div class="panel">
      <div class="panel-title">state · 状态</div>
      <div class="state-strip" id="state-strip">
        <button data-state="clear" class="active">Static</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">movement · 移动</div>
      <div class="row">
        <div class="dpad" id="dpad">
          <button data-dir="north-west">↖</button>
          <button data-dir="north">↑</button>
          <button data-dir="north-east">↗</button>
          <button data-dir="west">←</button>
          <button data-dir="east">→</button>
          <button data-dir="south-west">↙</button>
          <button data-dir="south">↓</button>
          <button data-dir="south-east">↘</button>
        </div>
        <div class="side">
          <div class="group">
            <div class="group-label">playback</div>
            <div class="btns">
              <button id="btn-prev" title="prev frame [">◀</button>
              <button id="btn-play" title="toggle play (Space)">▶</button>
              <button id="btn-next" title="next frame ]">▶|</button>
            </div>
          </div>
          <div class="group">
            <div class="group-label">camera</div>
            <div class="btns">
              <button id="btn-zoom" title="toggle zoom (X)">🔍</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">status</div>
      <div class="status" id="status">connecting…</div>
    </div>

    <div class="panel">
      <div class="panel-title">keyboard</div>
      <div class="keymap-help">
        <div><b>移动</b>: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> (8-dir 加 <kbd>Q</kbd><kbd>E</kbd><kbd>Z</kbd><kbd>C</kbd>) — 持续按住</div>
        <div><b>状态</b>: <kbd>Tab</kbd> 清回自动 · <kbd>1</kbd>-<kbd>9</kbd> 选状态</div>
        <div><b>播放</b>: <kbd>Space</kbd> 暂停/继续 · <kbd>[</kbd><kbd>]</kbd> 单步</div>
        <div><b>缩放</b>: <kbd>X</kbd> 切远/近</div>
      </div>
    </div>
  </main>

  <script type="module">
    import { SPRITE_KEYMAP } from './keymap.js';

    const DEFAULT_SPRITE = 'assets/sprites/yellow_Shiba';
    const ALL_DIRS = [
      'north', 'east', 'south', 'west',
      'north-east', 'north-west', 'south-east', 'south-west',
    ];

    // Local state mirrors what we'll POST. Keep it as the single source of truth;
    // every change calls postState().
    const localState = {
      keys: Object.fromEntries(ALL_DIRS.map((d) => [d, false])),
      stateReq: { value: 'clear', seq: 0 },
      animReq: { value: 'toggle_play', seq: 0 },
      zoomReq: { seq: 0 },
    };

    const statusEl = document.getElementById('status');
    let lastPostOk = null;

    async function postState() {
      try {
        const r = await fetch('/api/control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(localState),
        });
        lastPostOk = r.ok;
        renderStatus();
      } catch (e) {
        lastPostOk = false;
        renderStatus(e.message);
      }
    }

    function renderStatus(err) {
      const activeDirs = Object.entries(localState.keys)
        .filter(([, v]) => v)
        .map(([k]) => k);
      const okMark = err
        ? `<span class="err">✗ ${err}</span>`
        : (lastPostOk === null ? 'connecting…' : (lastPostOk ? '<span class="ok">✓ connected</span>' : '<span class="err">✗ post failed</span>'));
      const lines = [
        `${okMark}`,
        `<span class="keys-active">keys: ${activeDirs.length ? activeDirs.join(' + ') : '(none)'}</span>`,
        `state: <b>${localState.stateReq.value}</b> (seq ${localState.stateReq.seq})`,
        `anim: ${localState.animReq.value} (seq ${localState.animReq.seq})`,
        `zoom: seq ${localState.zoomReq.seq}`,
      ];
      statusEl.innerHTML = lines.join('<br>');
    }

    /* ───────────────────────────────────────────────────────────────────────
     * Sprite metadata — drives DPad direction count and state strip
     * ─────────────────────────────────────────────────────────────────────── */
    let stateKeys = [];

    async function loadSpriteMeta() {
      const url = `${DEFAULT_SPRITE}/metadata.json`;
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const meta = await r.json();
        const dirs = Object.keys(meta.frames?.rotations ?? {});
        // DPad: hide buttons whose direction the sprite doesn't have
        document.querySelectorAll('#dpad button[data-dir]').forEach((btn) => {
          btn.hidden = !dirs.includes(btn.dataset.dir);
        });
        // State strip: render Static + each state_key
        stateKeys = Object.keys(meta.frames?.animations ?? {});
        const strip = document.getElementById('state-strip');
        strip.innerHTML = '';
        const buttons = [
          { value: 'clear', label: 'Static' },
          ...stateKeys.map((k, i) => ({ value: `index:${i}`, label: k })),
        ];
        for (const b of buttons) {
          const btn = document.createElement('button');
          btn.dataset.state = b.value;
          btn.textContent = b.label;
          if (b.value === 'clear') btn.classList.add('active');
          btn.addEventListener('click', () => triggerState(b.value));
          strip.appendChild(btn);
        }
      } catch (e) {
        statusEl.innerHTML = `<span class="err">无法读取 sprite metadata (${url}): ${e.message}</span>`;
      }
    }

    function highlightActiveState() {
      document.querySelectorAll('#state-strip button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.state === localState.stateReq.value);
      });
    }

    /* ───────────────────────────────────────────────────────────────────────
     * Action triggers — each bumps the appropriate seq and posts
     * ─────────────────────────────────────────────────────────────────────── */

    function triggerState(value) {
      localState.stateReq = { value, seq: localState.stateReq.seq + 1 };
      highlightActiveState();
      postState();
    }
    function triggerAnim(value) {
      localState.animReq = { value, seq: localState.animReq.seq + 1 };
      postState();
    }
    function triggerZoom() {
      localState.zoomReq = { seq: localState.zoomReq.seq + 1 };
      postState();
    }
    function setKey(dir, down) {
      if (localState.keys[dir] === down) return;
      localState.keys[dir] = down;
      // visual feedback on the button
      const btn = document.querySelector(`#dpad button[data-dir="${dir}"]`);
      if (btn) btn.classList.toggle('pressed', down);
      postState();
    }

    /* ───────────────────────────────────────────────────────────────────────
     * DPad pointer events (hold-to-move)
     * ─────────────────────────────────────────────────────────────────────── */
    document.querySelectorAll('#dpad button[data-dir]').forEach((btn) => {
      const dir = btn.dataset.dir;
      const onDown = (e) => { e.preventDefault(); setKey(dir, true); };
      const onUp = (e) => { if (e?.preventDefault) e.preventDefault(); setKey(dir, false); };
      btn.addEventListener('pointerdown', onDown);
      btn.addEventListener('pointerup', onUp);
      btn.addEventListener('pointercancel', onUp);
      btn.addEventListener('pointerleave', (e) => {
        // only release if pointer was pressed and left
        if (localState.keys[dir]) onUp(e);
      });
    });

    /* Side buttons */
    document.getElementById('btn-prev').addEventListener('click', () => triggerAnim('prev'));
    document.getElementById('btn-play').addEventListener('click', () => triggerAnim('toggle_play'));
    document.getElementById('btn-next').addEventListener('click', () => triggerAnim('next'));
    document.getElementById('btn-zoom').addEventListener('click', () => triggerZoom());

    /* ───────────────────────────────────────────────────────────────────────
     * Physical keyboard — mirrors SPRITE_KEYMAP semantics. WASD/QEZC are
     * hold-state (down/up); state/anim/zoom are triggers.
     * ─────────────────────────────────────────────────────────────────────── */
    // Reverse-map: action+value → list of event.code
    const faceCodeToDir = {};
    for (const [code, b] of Object.entries(SPRITE_KEYMAP)) {
      if (b.action === 'face') faceCodeToDir[code] = b.value;
    }

    window.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const dir = faceCodeToDir[e.code];
      if (dir && localState.keys[dir] !== undefined) {
        // Only trigger if the sprite has this direction (DPad button visible)
        const btn = document.querySelector(`#dpad button[data-dir="${dir}"]`);
        if (btn && !btn.hidden) {
          setKey(dir, true);
          e.preventDefault();
          return;
        }
      }
      const binding = SPRITE_KEYMAP[e.code];
      if (!binding) return;
      if (binding.action === 'state') {
        if (binding.value === 'clear') triggerState('clear');
        else if (binding.value.startsWith('index:')) {
          const idx = parseInt(binding.value.slice(6), 10);
          if (idx < stateKeys.length) triggerState(`index:${idx}`);
        }
        e.preventDefault();
      } else if (binding.action === 'animation') {
        triggerAnim(binding.value);
        e.preventDefault();
      } else if (binding.action === 'zoom') {
        // Sprite-preview's zoom keys are -/=/0; in level preview we collapse
        // them onto a single toggle. Map any zoom key press to triggerZoom.
        triggerZoom();
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      const dir = faceCodeToDir[e.code];
      if (dir && localState.keys[dir] !== undefined) {
        setKey(dir, false);
        e.preventDefault();
      }
    });

    // Release all keys on blur (avoid sticky keys when alt-tabbing)
    window.addEventListener('blur', () => {
      for (const d of ALL_DIRS) {
        if (localState.keys[d]) setKey(d, false);
      }
    });

    /* ───────────────────────────────────────────────────────────────────────
     * Boot
     * ─────────────────────────────────────────────────────────────────────── */
    await loadSpriteMeta();
    await postState();         // initial sync so server knows we're here
  </script>
</body>
</html>
